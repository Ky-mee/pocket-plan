name: pocket_plan
description: PocketPlan - Personal Finance Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  smooth_page_indicator: ^1.1.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.2.5

  # State management
  flutter_riverpod: ^2.6.1

  # Biometrics
  local_auth: ^2.3.0

  # Charts
  fl_chart: ^0.70.2

  # HTTP
  http: ^1.3.0
  dio: ^5.8.0

  # Location
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # UI helpers
  shimmer: ^3.0.0
  lottie: ^3.3.1

  # Storage
  shared_preferences: ^2.5.3
  flutter_dotenv: ^5.2.1

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Date
  intl: ^0.20.2

  # Export
  pdf: ^3.10.8
  csv: ^6.0.0
  path_provider: ^2.1.2
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/pocketplan_app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: "assets/icons/pocketplan_app_icon.png"